name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BINARY="mc-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "${BINARY}" \
            ./cmd/mc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mc-${{ matrix.goos }}-${{ matrix.goarch }}
          path: mc-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum mc-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "${{ github.ref_name }}" \
            --title "Midnight Captain v${VERSION}" \
            --generate-notes \
            dist/mc-linux-amd64 \
            dist/mc-linux-arm64 \
            dist/mc-darwin-amd64 \
            dist/mc-darwin-arm64 \
            dist/checksums.txt
